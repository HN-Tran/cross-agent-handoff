name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (native CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq python3 shellcheck git

      - name: Make scripts executable
        run: chmod +x bin/cross-agent-handoff install-global.sh scripts/ci-smoke.sh hooks/**/*.sh docker/entrypoint.sh

      - name: Run smoke tests
        run: ./scripts/ci-smoke.sh

  docker:
    name: Smoke (Docker Compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Prepare .env
        run: |
          cp .env.example .env
          {
            echo "UID=$(id -u)"
            echo "GID=$(id -g)"
            echo "HOME=${HOME}"
            echo "USER=runner"
          } >> .env

      - name: Build and start
        run: |
          docker compose build
          docker compose up -d
          sleep 3
          docker compose ps

      - name: Init via exec
        run: |
          mkdir -p "${HOME}/ci-repo"
          git -C "${HOME}/ci-repo" init -q
          git -C "${HOME}/ci-repo" config user.email "ci@github.com"
          git -C "${HOME}/ci-repo" config user.name "GitHub Actions"
          echo "# ci" > "${HOME}/ci-repo/README.md"
          git -C "${HOME}/ci-repo" add README.md
          git -C "${HOME}/ci-repo" commit -qm "init"
          docker compose exec -T -w "${HOME}/ci-repo" cli init
          test -f "${HOME}/ci-repo/.agent/SESSION.md"

      - name: Hook via exec
        run: |
          OUT=$(echo '{"cwd":"'"${HOME}/ci-repo"'"}' | docker compose exec -T cli hook session-start cursor)
          echo "$OUT" | jq -e '.additional_context | length > 0'

      - name: Tear down
        if: always()
        run: docker compose down -v
